<!DOCTYPE html>
<html>
<head>
    <title>mDrive Wallet - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
</head>
<body>
<div class="ui middle aligned center aligned grid" style="height: 100vh;">
    <div class="column" style="max-width: 450px;">
        <h2 class="ui teal image header">
            <div class="content">mDrive Wallet Login</div>
        </h2>
        <form class="ui large form" id="loginForm">
            <div class="ui stacked segment">
                <div class="field">
                    <div class="ui left icon input">
                        <i class="mail icon"></i>
                        <input type="email" name="email" placeholder="E-mail address" required>
                    </div>
                </div>
                <div class="field">
                    <div class="ui left icon input">
                        <i class="lock icon"></i>
                        <input type="password" name="password" placeholder="Password" required>
                    </div>
                </div>
                <button class="ui fluid large teal submit button" type="submit">Login</button>
            </div>
            <div class="ui error message" id="errorMessage"></div>
        </form>
        <div class="ui message">
            New here? <a href="/signup/">Sign Up</a>
        </div>
        <div class="ui segment" id="welcomeBox" style="display:none;">
            <h3 id="welcomeText"></h3>
            <p id="pointsText"></p>
        </div>
    </div>
</div>
<script>
  document.getElementById('signupForm').addEventListener('submit' , async function(e){
    e.preventDefault();
    const formdata = new FormData(this);
    const data = Object.fromEntries(formdata)

    const errorBox = document.getElementById('errorMessage')
    const successBox = document.getElementById('successMessage')

    errorBox.style.display = 'none';
    successBox.style.display = 'none';

    try {
        const response = await fetch('/api/auth/signup/',{
            method : 'POST',
            headers : {'Content-Type': 'application/json' },
            body : JSON.stringify(data)
        });
        const result = await response.json();

        if (response.ok){
            successBox.textContent = 'Signup successful Redirecting to login ....';
            successBox.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/login/'
                
            },  1500);
        }else{
             errorBox.textContent = JSON.stringify(result);
            errorBox.style.display = 'block';
        }
    }catch(err){
             errorBox.textContent = 'Something went wrong. Please try again.';
        errorBox.style.display = 'block';
    }
  });
</script>
</body>
</html>
