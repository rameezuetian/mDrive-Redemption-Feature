<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mDrive Wallet - Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
   <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
        body {
            background-color: #f7f8fa;
        }
        .page-wrap {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 15px;
        }
        .points-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="page-wrap">

    <div class="points-bar">
        <h2 class="ui header">Redeemable Products</h2>
        <div class="ui teal label">
            Wallet Points: <span id="pointsBadge">-</span>
        </div>
    </div>

    <div class="ui secondary menu">
        <a class="item active" href="/products/">Products</a>
        <a class="item" href="/offers/">Offers</a>
        <a class="item" href="/history/">My History</a>
        <a class="item" href="/login/">Logout</a>
    </div>

    <div class="ui info message" id="activeQrBanner" style="display:none;">
        <i class="qrcode icon"></i>
        You have an active QR code waiting to be scanned.
        <button class="ui mini teal button" id="showQrBtn" style="margin-left: 8px;">Show QR</button>
        (expires in <span id="activeQrCountdown">--:--</span>)

        <div id="inlineQrBox" style="display:none; margin-top: 15px; text-align: center;">
            <canvas id="inlineQrCanvas"></canvas>
            <p style="margin-top: 8px; font-size: 13px; color:#555;">
                Code: <span id="inlineQrCode"></span>
            </p>
        </div>
    </div>

    <div class="ui error message" id="errorMessage" style="display:none;"></div>

    <div class="ui three stackable cards" id="productsContainer">
        <!-- Product cards injected here -->
    </div>

</div>

<script>
const customerId = localStorage.getItem('customer_id');

if (!customerId) {
    window.location.href = '/login/';
}

async function loadCustomer() {
    const res = await fetch(`/api/customers/${customerId}/`);
    const data = await res.json();
    document.getElementById('pointsBadge').textContent = data.wallet_points;
}

function checkActiveQr() {
    const code = localStorage.getItem('last_qr_code');
    const expiry = localStorage.getItem('last_qr_expiry');

    if (!code || !expiry) return;

    const expiryTime = new Date(expiry).getTime();
    const now = new Date().getTime();
    const remainingMs = expiryTime - now;

    if (remainingMs <= 0) {
        // expired, clean up so we don't keep checking
        localStorage.removeItem('last_qr_code');
        localStorage.removeItem('last_qr_expiry');
        localStorage.removeItem('last_redemption_type');
        return;
    }

    const banner = document.getElementById('activeQrBanner');
    const countdownEl = document.getElementById('activeQrCountdown');
    banner.style.display = 'block';

    const showQrBtn = document.getElementById('showQrBtn');
    const inlineQrBox = document.getElementById('inlineQrBox');
    let qrRendered = false;

    showQrBtn.addEventListener('click', function () {
        const isVisible = inlineQrBox.style.display === 'block';

        if (isVisible) {
            inlineQrBox.style.display = 'none';
            showQrBtn.textContent = 'Show QR';
            return;
        }

        if (!qrRendered) {
            QRCode.toCanvas(document.getElementById('inlineQrCanvas'), code, { width: 180 }, function (error) {
                if (error) console.error(error);
            });
            document.getElementById('inlineQrCode').textContent = code;
            qrRendered = true;
        }

        inlineQrBox.style.display = 'block';
        showQrBtn.textContent = 'Hide QR';
    });

    function tick() {
        const remaining = expiryTime - new Date().getTime();
        if (remaining <= 0) {
            banner.style.display = 'none';
            clearInterval(tickInterval);
            localStorage.removeItem('last_qr_code');
            localStorage.removeItem('last_qr_expiry');
            localStorage.removeItem('last_redemption_type');
            return;
        }
        const totalSeconds = Math.floor(remaining / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        countdownEl.textContent = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    }

    tick();
    const tickInterval = setInterval(tick, 1000);
}

async function loadProducts() {
    const res = await fetch('/api/products/');
    const products = await res.json();
    const container = document.getElementById('productsContainer');
    container.innerHTML = '';

    products
        .filter(p => p.status === 'active')
        .forEach(product => {
            const card = document.createElement('div');
            card.className = 'ui card';
            card.innerHTML = `
                <div class="content">
                    <div class="header">${product.name}</div>
                    <div class="meta">${product.category || ''}</div>
                    <div class="description">${product.description || ''}</div>
                </div>
                <div class="content">
                    <span class="ui teal label">${product.points_required} pts</span>
                    <span class="ui basic label">${product.available_quantity} left</span>
                </div>
                <div class="ui bottom attached button redeemBtn" data-id="${product.id}" data-points="${product.points_required}">
                    Redeem
                </div>
            `;
            container.appendChild(card);
        });

    document.querySelectorAll('.redeemBtn').forEach(btn => {
        btn.addEventListener('click', handleRedeem);
    });
}

async function handleRedeem(e) {
    const productId = e.target.getAttribute('data-id');
    const errorBox = document.getElementById('errorMessage');
    errorBox.style.display = 'none';

    try {
        const response = await fetch('/api/redeem/product/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                customer_id: customerId,
                product_id: productId
            })
        });
        const result = await response.json();

        if (response.ok) {
            localStorage.setItem('last_qr_code', result.qr_code.code);
            localStorage.setItem('last_qr_expiry', result.qr_code.expires_at);
            localStorage.setItem('last_redemption_type', 'Product');
            window.location.href = '/qr/';
        } else {
            errorBox.textContent = result.error || 'Redemption failed.';
            errorBox.style.display = 'block';
        }
    } catch (err) {
        errorBox.textContent = 'Something went wrong. Please try again.';
        errorBox.style.display = 'block';
    }
}

loadCustomer();
loadProducts();
checkActiveQr();
</script>

</body>
</html>
