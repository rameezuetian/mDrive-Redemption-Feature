<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mDrive Wallet - Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
        body { background-color: #f7f8fa; }
        .page-wrap { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        .points-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .filter-bar { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .activation-badge { margin-top: 8px; }
        .countdown-box { margin-top: 10px; text-align: center; }
        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }
        .wallet-card {
            overflow: hidden;
            border-radius: 22px;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
        }
        .wallet-card-image {
            height: 150px;
            background: linear-gradient(135deg, #d9f3ef, #edf6ff);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .wallet-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .wallet-card-image span {
            color: #6b7280;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .wallet-card .content {
            border-top: none !important;
        }
        .wallet-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .wallet-summary {
            color: #667085;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 40px;
        }
    </style>
</head>
<body>

<div class="page-wrap">

    <div class="points-bar">
        <h2 class="ui header">Redeemable Products</h2>
        <div class="ui teal label">
            Wallet Points: <span id="pointsBadge">-</span>
        </div>
    </div>

    <div class="ui secondary menu">
        <a class="item active" href="/products/">Products</a>
        <a class="item" href="/offers/">Offers</a>
        <a class="item" href="/history/">My History</a>
        <a class="item" href="/login/">Logout</a>
    </div>

    <div class="filter-bar">
        <select class="ui dropdown" id="statusFilter" style="min-width: 160px;">
            <option value="activated">Activated</option>
            <option value="expired">Expired</option>
            <option value="all">All</option>
        </select>
    </div>

    <div class="ui error message" id="errorMessage" style="display:none;"></div>

    <div class="wallet-grid" id="productsContainer"></div>

</div>

<script>
const customerId = localStorage.getItem('customer_id');

if (!customerId) {
    window.location.href = '/login/';
}

let customerMembership = null;

async function loadCustomer() {
    const res = await fetch(`/api/customers/${customerId}/`);
    const data = await res.json();
    document.getElementById('pointsBadge').textContent = data.wallet_points;
    customerMembership = data.membership_level;
}

function getPriceForCustomer(product) {
    if (!customerMembership || !product.tier_pricing) {
        return product.points_required;
    }
    const match = product.tier_pricing.find(tp => tp.membership_level === customerMembership);
    return match ? match.points_required : product.points_required;
}

function formatCountdown(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

async function loadProducts() {
    const statusValue = document.getElementById('statusFilter').value;
    const errorBox = document.getElementById('errorMessage');
    errorBox.style.display = 'none';

    try {
        const res = await fetch(`/api/products/?status=${statusValue}`);
        const products = await res.json();
        const container = document.getElementById('productsContainer');
        container.innerHTML = '';

        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'ui card';
            card.classList.add('wallet-card');
            card.id = `product-card-${product.id}`;

            const yourPrice = getPriceForCustomer(product);
            const isDiscounted = yourPrice !== product.points_required;


            const priceHtml = isDiscounted
                ? `<span class="ui teal label">${yourPrice} pts</span> <s style="color:#aaa;">${product.points_required} pts</s>`
                : `<span class="ui teal label">${yourPrice} pts</span>`;

            const btnHtml = statusValue === 'expired'
                ? `<div class="ui bottom attached disabled button">Expired</div>`
                : (product.available_quantity <= 0
                    ? `<div class="ui bottom attached disabled button">Out of Stock</div>`
                    : `<a href="/products/${product.id}/" class="ui bottom attached button">Activate</a>`);

            card.innerHTML = `
                <div class="wallet-card-image">
                    ${product.image
                        ? `<img src="${product.image}" alt="${product.name}">`
                        : '<span>No image</span>'}
                </div>
                <div class="content">
                    <div class="header">${product.name}</div>
                    <div class="meta">${product.category || ''}</div>
                    <div class="description wallet-summary">${product.short_description || product.description || ''}</div>
                </div>
                <div class="content">
                    <div class="wallet-meta">
                        ${priceHtml}
                        <span class="ui basic label">${product.available_quantity} left</span>
                    </div>
                    <div class="activation-badge" id="activation-badge-${product.id}"></div>
                    <div class="countdown-box" id="countdown-box-${product.id}" style="display:none;"></div>
                </div>
                ${btnHtml}
            `;
            container.appendChild(card);

            loadCardStatus(product.id);
        });

        if (products.length === 0) {
            container.innerHTML = '<p style="color:#888;">No products found for this filter.</p>';
        }
    } catch (err) {
        errorBox.textContent = 'Failed to load products.';
        errorBox.style.display = 'block';
    }
}

async function loadCardStatus(productId) {
    try {
        const countRes = await fetch(`/api/redeem/activation-count/?customer_id=${customerId}&product_id=${productId}`);
        const countData = await countRes.json();
        const badge = document.getElementById(`activation-badge-${productId}`);
        if (badge && countData.activation_count > 0) {
            badge.innerHTML = `<span class="ui small blue label"><i class="check icon"></i> Activated ${countData.activation_count} time(s)</span>`;
        }

        const statusRes = await fetch(`/api/redeem/active-status/?customer_id=${customerId}&product_id=${productId}`);
        const statusData = await statusRes.json();
        const box = document.getElementById(`countdown-box-${productId}`);

        if (statusData.active && box) {
            box.style.display = 'block';
            box.innerHTML = `
                <button class="ui mini teal button showQrBtn" data-code="${statusData.code}">Show QR</button>
                <div class="ui label" style="margin-top:6px;">
                    <i class="clock icon"></i> <span class="countdownText">--:--</span> remaining
                </div>
            `;

            const countdownEl = box.querySelector('.countdownText');
            let remaining = statusData.remaining_seconds;

            const interval = setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    clearInterval(interval);
                    box.style.display = 'none';
                    return;
                }
                countdownEl.textContent = formatCountdown(remaining);
            }, 1000);
            countdownEl.textContent = formatCountdown(remaining);

            box.querySelector('.showQrBtn').addEventListener('click', function () {
                showInlineQr(productId, statusData.code, box);
            });
        }
    } catch (err) {
        console.error('Failed to load card status for product', productId, err);
    }
}

function showInlineQr(productId, code, box) {
    let qrArea = box.querySelector('.inlineQrArea');
    if (qrArea) {
        qrArea.style.display = qrArea.style.display === 'none' ? 'block' : 'none';
        return;
    }

    qrArea = document.createElement('div');
    qrArea.className = 'inlineQrArea';
    qrArea.style.marginTop = '10px';

    const canvas = document.createElement('canvas');
    qrArea.appendChild(canvas);

    const codeText = document.createElement('p');
    codeText.style.marginTop = '8px';
    codeText.style.fontSize = '12px';
    codeText.style.color = '#555';
    codeText.style.wordBreak = 'break-all';
    codeText.innerHTML = `<strong>Code:</strong> ${code}`;
    qrArea.appendChild(codeText);

    box.appendChild(qrArea);

    QRCode.toCanvas(canvas, code, { width: 150 }, function (error) {
        if (error) console.error(error);
    });
}

document.getElementById('statusFilter').addEventListener('change', loadProducts);

async function init() {
    await loadCustomer();
    await loadProducts();
}

init();
</script>

</body>
</html>
