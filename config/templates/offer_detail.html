<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mDrive Wallet - Offer Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
        body { background-color: #f7f8fa; }
        .page-wrap { max-width: 700px; margin: 30px auto; padding: 0 15px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .qr-section { text-align: center; margin-top: 20px; }
        .hero-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 20px;
            display: none;
            margin-bottom: 18px;
        }
        .hero-placeholder {
            display: none;
            min-height: 150px;
            border-radius: 20px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, #fff4d7, #ffe9e2);
            align-items: center;
            justify-content: center;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 13px;
        }
        .offer-facts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin: 18px 0;
        }
        .offer-facts .ui.segment {
            margin: 0;
            background: #fafafa;
        }
    </style>
</head>
<body>

<div class="page-wrap">

    <div class="page-header">
        <a href="/offers/" class="ui basic button"><i class="arrow left icon"></i> Back to Offers</a>
        <div class="ui teal label">
            Wallet Points: <span id="pointsBadge">-</span>
        </div>
    </div>

    <div class="ui error message" id="errorMessage" style="display:none;"></div>

    <div class="ui segment" id="offerSegment" style="display:none;">
        <img id="offerImage" class="hero-image" alt="Offer image">
        <div id="offerImagePlaceholder" class="hero-placeholder">No image available</div>

        <h2 class="ui header" id="offerTitle"></h2>
        <div class="ui label" id="offerCategory"></div>
        <span class="ui small blue label" id="activationBadge" style="display:none;"></span>

        <div class="offer-facts">
            <div class="ui segment">
                <strong>Validity</strong>
                <p id="offerValidity" style="margin-top:6px; color:#555;"></p>
            </div>
            <div class="ui segment">
                <strong>Eligibility</strong>
                <p id="offerEligibility" style="margin-top:6px; color:#555;"></p>
            </div>
            <div class="ui segment">
                <strong>Redemption Limit</strong>
                <p id="offerLimit" style="margin-top:6px; color:#555;"></p>
            </div>
        </div>

        <p id="offerDescription"></p>

        <div class="ui segment" style="background:#fafafa;">
            <strong>Terms &amp; Conditions</strong>
            <p id="offerTerms" style="margin-top:6px; color:#555;"></p>
        </div>

        <div class="ui segment" style="background:#fafafa;">
            <strong>How To Redeem</strong>
            <p id="offerInstructions" style="margin-top:6px; color:#555;"></p>
        </div>

        <div class="ui divider"></div>

        <button class="ui fluid large teal button" id="activateBtn" style="display:none;">
            Activate Offer
        </button>

        <div class="qr-section" id="qrSection" style="display:none;">
            <h4 class="ui header">Show This At The Outlet</h4>
            <canvas id="qrCanvas"></canvas>
            <p style="margin-top:10px; font-size: 13px; color:#555;">
                <strong>Code:</strong> <span id="qrCodeText"></span>
            </p>
            <div class="ui label" style="margin-top:6px;">
                <i class="clock icon"></i> <span id="countdownText">--:--</span> remaining
            </div>
        </div>
    </div>

</div>

<script>
const customerId = localStorage.getItem('customer_id');

if (!customerId) {
    window.location.href = '/login/';
}

const pathParts = window.location.pathname.split('/').filter(Boolean);
const offerId = pathParts[pathParts.length - 1];

let customerMembership = null;
let countdownInterval = null;
let currentOffer = null;

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function formatCountdown(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function isEligible(offer) {
    if (!offer.membership_eligibility || offer.membership_eligibility.trim().toLowerCase() === 'all tiers') {
        return true;
    }
    const tiers = offer.membership_eligibility.split(',').map(t => t.trim().toLowerCase());
    return customerMembership && tiers.includes(customerMembership.toLowerCase());
}

function isExpired(offer) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return new Date(offer.end_date) < today || offer.status === 'expired';
}

async function loadCustomer() {
    const res = await fetch(`/api/customers/${customerId}/`);
    const data = await res.json();
    document.getElementById('pointsBadge').textContent = data.wallet_points;
    customerMembership = data.membership_level;
}

async function loadOffer() {
    const errorBox = document.getElementById('errorMessage');

    try {
        const res = await fetch(`/api/offers/${offerId}/`);
        if (!res.ok) {
            errorBox.textContent = 'Offer not found.';
            errorBox.style.display = 'block';
            return null;
        }
        return await res.json();
    } catch (err) {
        errorBox.textContent = 'Failed to load offer.';
        errorBox.style.display = 'block';
        return null;
    }
}

function renderOffer(offer) {
    document.getElementById('offerSegment').style.display = 'block';
    const offerImage = document.getElementById('offerImage');
    const offerImagePlaceholder = document.getElementById('offerImagePlaceholder');

    if (offer.banner) {
        offerImage.src = offer.banner;
        offerImage.style.display = 'block';
        offerImagePlaceholder.style.display = 'none';
    } else {
        offerImage.style.display = 'none';
        offerImagePlaceholder.style.display = 'flex';
    }

    document.getElementById('offerTitle').textContent = offer.title;
    document.getElementById('offerCategory').textContent = offer.category || 'Offer';
    document.getElementById('offerValidity').textContent = `${formatDate(offer.start_date)} - ${formatDate(offer.end_date)}`;
    document.getElementById('offerEligibility').textContent = offer.membership_eligibility || 'All tiers';
    document.getElementById('offerLimit').textContent = `${offer.redemption_limit} redemption(s)`;
    document.getElementById('offerDescription').textContent = offer.description || 'No additional description provided.';
    document.getElementById('offerTerms').textContent = offer.terms_and_conditions || 'No specific terms provided.';
    document.getElementById('offerInstructions').textContent = offer.redemption_instructions || 'Activate this offer and scan the QR at the outlet.';
}

async function loadActivationCount() {
    const res = await fetch(`/api/redeem/activation-count/?customer_id=${customerId}&offer_id=${offerId}`);
    const data = await res.json();
    const badge = document.getElementById('activationBadge');
    if (data.activation_count > 0) {
        badge.textContent = `Activated ${data.activation_count} time(s)`;
        badge.style.display = 'inline-block';
    }
}

async function checkActiveStatus() {
    const res = await fetch(`/api/redeem/active-status/?customer_id=${customerId}&offer_id=${offerId}`);
    const data = await res.json();

    const activateBtn = document.getElementById('activateBtn');
    const qrSection = document.getElementById('qrSection');

    if (data.active) {
        activateBtn.style.display = 'none';
        qrSection.style.display = 'block';

        document.getElementById('qrCodeText').textContent = data.code;
        QRCode.toCanvas(document.getElementById('qrCanvas'), data.code, { width: 200 }, function (error) {
            if (error) console.error(error);
        });

        if (countdownInterval) clearInterval(countdownInterval);
        let remaining = data.remaining_seconds;
        const countdownEl = document.getElementById('countdownText');
        countdownEl.textContent = formatCountdown(remaining);

        countdownInterval = setInterval(() => {
            remaining -= 1;
            if (remaining <= 0) {
                clearInterval(countdownInterval);
                qrSection.style.display = 'none';
                toggleActivationState();
                return;
            }
            countdownEl.textContent = formatCountdown(remaining);
        }, 1000);
        return;
    }

    qrSection.style.display = 'none';
    toggleActivationState();
}

function toggleActivationState() {
    const activateBtn = document.getElementById('activateBtn');
    if (!currentOffer) {
        activateBtn.style.display = 'none';
        return;
    }
    const eligible = isEligible(currentOffer);
    const expired = isExpired(currentOffer);
    const inactive = currentOffer.status === 'inactive';

    if (!eligible) {
        activateBtn.textContent = 'Not Eligible For Your Tier';
        activateBtn.classList.add('disabled');
        activateBtn.style.display = 'block';
        return;
    }

    if (expired || inactive) {
        activateBtn.textContent = expired ? 'Offer Expired' : 'Offer Inactive';
        activateBtn.classList.add('disabled');
        activateBtn.style.display = 'block';
        return;
    }

    activateBtn.textContent = 'Activate Offer';
    activateBtn.classList.remove('disabled');
    activateBtn.style.display = 'block';
}

async function handleActivate() {
    if (!currentOffer || !isEligible(currentOffer) || isExpired(currentOffer) || currentOffer.status === 'inactive') {
        return;
    }

    const errorBox = document.getElementById('errorMessage');
    errorBox.style.display = 'none';

    try {
        const response = await fetch('/api/redeem/offer/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                customer_id: customerId,
                offer_id: offerId
            })
        });
        const result = await response.json();

        if (response.ok) {
            await checkActiveStatus();
            await loadActivationCount();
        } else {
            errorBox.textContent = result.error || 'Activation failed.';
            errorBox.style.display = 'block';
            window.scrollTo(0, 0);
        }
    } catch (err) {
        errorBox.textContent = 'Something went wrong. Please try again.';
        errorBox.style.display = 'block';
    }
}

document.getElementById('activateBtn').addEventListener('click', handleActivate);

async function init() {
    await loadCustomer();
    currentOffer = await loadOffer();
    if (!currentOffer) return;

    renderOffer(currentOffer);
    await loadActivationCount();
    await checkActiveStatus();
}

init();
</script>

</body>
</html>
