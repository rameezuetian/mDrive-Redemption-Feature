<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mDrive Wallet - Partner Manage Offers</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <style>
        body { background-color: #f7f8fa; }
        .page-wrap { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="page-wrap">

    <div class="page-header">
        <h2 class="ui header">
            <i class="building icon"></i>
            <div class="content">
                Partner Manage Offers
                <div class="sub header" id="companyName"></div>
            </div>
        </h2>
        <div>
            <span id="roleLabel" class="ui label" style="margin-right:10px;">Partner</span>
            <button class="ui basic button" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="ui secondary menu">
        <a class="item active" href="/partner-dashboard/">Offers</a>
        <a class="item" href="/partner-reports/">Reports</a>
    </div>

    <div class="ui error message" id="errorMessage" style="display:none;"></div>
    <div class="ui success message" id="successMessage" style="display:none;"></div>

    <button class="ui teal button" id="newOfferBtn" style="margin-bottom: 15px;">
        <i class="plus icon"></i> Add New Offer
    </button>

    <div class="ui segment" id="offerFormSegment" style="display:none;">
        <h3 class="ui header" id="formTitle">Add Offer</h3>
        <form class="ui form" id="offerForm">
            <input type="hidden" id="offerId">
            <div class="two fields">
                <div class="field">
                    <label>Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="field">
                    <label>Category</label>
                    <input type="text" id="category">
                </div>
            </div>
            <div class="field">
                <label>Description</label>
                <textarea id="description" rows="2"></textarea>
            </div>
            <div class="three fields">
                <div class="field">
                    <label>Start Date</label>
                    <input type="date" id="start_date" required>
                </div>
                <div class="field">
                    <label>End Date</label>
                    <input type="date" id="end_date" required>
                </div>
                <div class="field">
                    <label>Status</label>
                    <select class="ui dropdown" id="status">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="expired">Expired</option>
                    </select>
                </div>
            </div>
            <div class="two fields">
                <div class="field">
                    <label>Membership Eligibility</label>
                    <input type="text" id="membership_eligibility" placeholder="e.g. All tiers, or Gold, Platinum">
                </div>
                <div class="field">
                    <label>Redemption Limit</label>
                    <input type="number" id="redemption_limit" min="1" required>
                </div>
            </div>
            <div class="field">
                <label>Terms and Conditions</label>
                <textarea id="terms_and_conditions" rows="2"></textarea>
            </div>
            <div class="field">
                <label>Redemption Instructions</label>
                <textarea id="redemption_instructions" rows="2"></textarea>
            </div>

            <button class="ui teal button" type="submit">Save</button>
            <button class="ui basic button" type="button" id="cancelFormBtn">Cancel</button>
        </form>
    </div>

    <table class="ui celled striped table">
        <thead>
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Eligibility</th>
            <th>Valid Dates</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="offersBody"></tbody>
    </table>

</div>

<script>
const token = localStorage.getItem('partner_token');
const companyName = localStorage.getItem('partner_company_name');

if (!token) {
    window.location.href = '/partner-login/';
}

document.getElementById('companyName').textContent = companyName || 'Partner Account';

const authHeaders = {
    'Content-Type': 'application/json',
    'Authorization': 'Token ' + token
};

const errorBox = document.getElementById('errorMessage');
const successBox = document.getElementById('successMessage');
const formSegment = document.getElementById('offerFormSegment');
const form = document.getElementById('offerForm');

function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
    successBox.style.display = 'none';
}

function showSuccess(msg) {
    successBox.textContent = msg;
    successBox.style.display = 'block';
    errorBox.style.display = 'none';
    setTimeout(() => { successBox.style.display = 'none'; }, 2500);
}

function resetForm() {
    form.reset();
    document.getElementById('offerId').value = '';
    document.getElementById('formTitle').textContent = 'Add Offer';
}

function logoutPartner() {
    localStorage.removeItem('partner_token');
    localStorage.removeItem('partner_id');
    localStorage.removeItem('partner_company_name');
    window.location.href = '/partner-login/';
}

function handleUnauthorized(status) {
    if (status === 401 || status === 403) {
        logoutPartner();
        return true;
    }
    return false;
}

document.getElementById('newOfferBtn').addEventListener('click', function () {
    resetForm();
    formSegment.style.display = 'block';
});

document.getElementById('cancelFormBtn').addEventListener('click', function () {
    formSegment.style.display = 'none';
    resetForm();
});

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

async function loadOffers() {
    const res = await fetch('/api/partner/offers/', {
        headers: authHeaders
    });

    if (handleUnauthorized(res.status)) {
        return;
    }

    const offers = await res.json();
    const tbody = document.getElementById('offersBody');
    tbody.innerHTML = '';

    offers.forEach(o => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${o.title}</td>
            <td>${o.category || '-'}</td>
            <td>${o.membership_eligibility || 'All tiers'}</td>
            <td>${formatDate(o.start_date)} - ${formatDate(o.end_date)}</td>
            <td><span class="ui ${o.status === 'active' ? 'green' : (o.status === 'expired' ? 'red' : 'grey')} label">${o.status}</span></td>
            <td>
                <button class="ui mini button editBtn" data-id="${o.id}">Edit</button>
                <button class="ui mini red button deleteBtn" data-id="${o.id}">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });

    document.querySelectorAll('.editBtn').forEach(btn => {
        btn.addEventListener('click', () => editOffer(btn.getAttribute('data-id'), offers));
    });
    document.querySelectorAll('.deleteBtn').forEach(btn => {
        btn.addEventListener('click', () => deleteOffer(btn.getAttribute('data-id')));
    });
}

function editOffer(id, offers) {
    const offer = offers.find(o => o.id == id);
    if (!offer) return;

    document.getElementById('offerId').value = offer.id;
    document.getElementById('title').value = offer.title;
    document.getElementById('category').value = offer.category || '';
    document.getElementById('description').value = offer.description || '';
    document.getElementById('start_date').value = offer.start_date;
    document.getElementById('end_date').value = offer.end_date;
    document.getElementById('status').value = offer.status;
    document.getElementById('membership_eligibility').value = offer.membership_eligibility || '';
    document.getElementById('redemption_limit').value = offer.redemption_limit;
    document.getElementById('terms_and_conditions').value = offer.terms_and_conditions || '';
    document.getElementById('redemption_instructions').value = offer.redemption_instructions || '';

    document.getElementById('formTitle').textContent = 'Edit Offer: ' + offer.title;
    formSegment.style.display = 'block';
    window.scrollTo(0, 0);
}

async function deleteOffer(id) {
    if (!confirm('Are you sure you want to delete this offer?')) return;

    try {
        const res = await fetch(`/api/partner/offers/${id}/`, {
            method: 'DELETE',
            headers: authHeaders
        });

        if (handleUnauthorized(res.status)) {
            return;
        }

        if (!res.ok) {
            showError('Failed to delete offer.');
            return;
        }

        showSuccess('Offer deleted.');
        loadOffers();
    } catch (err) {
        showError('Failed to delete offer.');
    }
}

form.addEventListener('submit', async function (e) {
    e.preventDefault();

    const id = document.getElementById('offerId').value;
    const payload = {
        title: document.getElementById('title').value,
        category: document.getElementById('category').value,
        description: document.getElementById('description').value,
        start_date: document.getElementById('start_date').value,
        end_date: document.getElementById('end_date').value,
        status: document.getElementById('status').value,
        membership_eligibility: document.getElementById('membership_eligibility').value,
        redemption_limit: parseInt(document.getElementById('redemption_limit').value),
        terms_and_conditions: document.getElementById('terms_and_conditions').value,
        redemption_instructions: document.getElementById('redemption_instructions').value
    };

    const url = id ? `/api/partner/offers/${id}/` : '/api/partner/offers/';
    const method = id ? 'PUT' : 'POST';

    try {
        const res = await fetch(url, {
            method: method,
            headers: authHeaders,
            body: JSON.stringify(payload)
        });

        if (handleUnauthorized(res.status)) {
            return;
        }

        const result = await res.json();

        if (res.ok) {
            showSuccess(id ? 'Offer updated successfully.' : 'Offer added successfully.');
            formSegment.style.display = 'none';
            resetForm();
            loadOffers();
        } else {
            showError(JSON.stringify(result));
        }
    } catch (err) {
        showError('Something went wrong. Please try again.');
    }
});

document.getElementById('logoutBtn').addEventListener('click', logoutPartner);

loadOffers();
</script>

</body>
</html>
