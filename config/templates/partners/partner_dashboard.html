<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mDrive Wallet - Partner Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <style>
        body { background-color: #f7f8fa; }
        .page-wrap { max-width: 950px; margin: 30px auto; padding: 0 15px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .redemptions-panel { background: #fafafa; }
    </style>
</head>
<body>

<div class="page-wrap">

    <div class="page-header">
        <h2 class="ui header">
            <i class="handshake outline icon"></i>
            <div class="content">
                Partner Dashboard
                <div class="sub header" id="companyName" style="color:#888;"></div>
            </div>
        </h2>
        <button class="ui basic button" id="logoutBtn">Logout</button>
        <a href="/partner-scan/" class="ui teal button">Scan QR</a>
<button class="ui basic button" id="logoutBtn">Logout</button>
    </div>

    <div class="ui error message" id="errorMessage" style="display:none;"></div>

    <div class="ui warning message" id="emptyMessage" style="display:none;">
        No offers have been assigned to your account yet. Contact mDrive to get your offers set up.
    </div>

    <div id="offersList"></div>

</div>

<script>
const token = localStorage.getItem('partner_token');
const companyName = localStorage.getItem('partner_company_name');

if (!token) {
    window.location.href = '/partner-login/';
}

document.getElementById('companyName').textContent = companyName || '';

const authHeaders = {
    'Content-Type': 'application/json',
    'Authorization': 'Token ' + token
};

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function formatDateTime(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function statusColor(status) {
    const map = { 'active': 'green', 'inactive': 'grey', 'expired': 'red' };
    return map[status] || 'grey';
}

async function loadMyOffers() {
    const errorBox = document.getElementById('errorMessage');
    const emptyMsg = document.getElementById('emptyMessage');
    const container = document.getElementById('offersList');

    try {
        const res = await fetch('/api/partners/my-offers/', { headers: authHeaders });

        if (res.status === 401 || res.status === 403) {
            window.location.href = '/partner-login/';
            return;
        }

        const offers = await res.json();

        if (!offers || offers.length === 0) {
            emptyMsg.style.display = 'block';
            return;
        }

        offers.forEach(offer => {
            const segment = document.createElement('div');
            segment.className = 'ui segment';
            segment.innerHTML = `
                <div class="ui grid">
                    <div class="thirteen wide column">
                        <h3 class="ui header">
                            ${offer.title}
                            <span class="ui ${statusColor(offer.status)} label" style="margin-left:8px;">${offer.status}</span>
                        </h3>
                        <p style="color:#666;">${offer.description || ''}</p>
                        <p style="font-size: 13px; color:#888;">
                            Valid: ${formatDate(offer.start_date)} - ${formatDate(offer.end_date)}
                            &nbsp;|&nbsp; Eligibility: ${offer.membership_eligibility || 'All tiers'}
                            &nbsp;|&nbsp; Limit per customer: ${offer.redemption_limit}
                        </p>
                    </div>
                    <div class="three wide column" style="text-align:center;">
                        <div class="ui small statistic">
                            <div class="value">${offer.total_redemptions}</div>
                            <div class="label">Redeemed</div>
                        </div>
                    </div>
                </div>
                <button class="ui mini teal button viewRedemptionsBtn" data-id="${offer.id}" style="margin-top:10px;">
                    View Redemptions
                </button>
                <div class="redemptions-panel ui segment" id="redemptions-${offer.id}" style="display:none; margin-top:10px;"></div>
            `;
            container.appendChild(segment);
        });

        document.querySelectorAll('.viewRedemptionsBtn').forEach(btn => {
            btn.addEventListener('click', () => toggleRedemptions(btn.getAttribute('data-id')));
        });

    } catch (err) {
        errorBox.textContent = 'Failed to load your offers.';
        errorBox.style.display = 'block';
    }
}

async function toggleRedemptions(offerId) {
    const panel = document.getElementById(`redemptions-${offerId}`);

    if (panel.style.display === 'block') {
        panel.style.display = 'none';
        return;
    }

    panel.innerHTML = '<p style="color:#888;">Loading...</p>';
    panel.style.display = 'block';

    try {
        const res = await fetch(`/api/partners/my-offers/${offerId}/redemptions/`, { headers: authHeaders });
        const data = await res.json();

        if (!data.redemptions || data.redemptions.length === 0) {
            panel.innerHTML = '<p style="color:#888;">No customers have redeemed this offer yet.</p>';
            return;
        }

        let rows = data.redemptions.map(r => `
            <tr>
                <td>${r.transaction_id || '-'}</td>
                <td>${formatDateTime(r.redeemed_at)}</td>
                <td>${r.customer_name}</td>
                <td><span class="ui ${r.status === 'completed' ? 'green' : 'blue'} label">${r.status}</span></td>
            </tr>
        `).join('');

        panel.innerHTML = `
            <table class="ui very compact celled table">
                <thead>
                <tr><th>Transaction ID</th><th>Redeemed At</th><th>Customer</th><th>Status</th></tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        `;
    } catch (err) {
        panel.innerHTML = '<p style="color:red;">Failed to load redemption details.</p>';
    }
}

document.getElementById('logoutBtn').addEventListener('click', function () {
    localStorage.removeItem('partner_token');
    localStorage.removeItem('partner_id');
    localStorage.removeItem('partner_company_name');
    window.location.href = '/partner-login/';
});

loadMyOffers();
</script>

</body>
</html>
